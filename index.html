<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daraz Clone</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="logo">Daraz</div>

  <input type="text" class="search" placeholder="Search in Daraz">

  <div class="nav-links">
    <a href="#">Login</a>
    <a href="#">Signup</a>
    <a href="#">Cart 🛒</a>
  </div>
</header>

<!-- CATEGORY BAR -->
<div class="categories">
  <a href="#">Electronics</a>
  <a href="#">Fashion</a>
  <a href="#">Home</a>
  <a href="#">Beauty</a>
  <a href="#">Sports</a>
</div>

<!-- HERO BANNER -->
<div class="banner">
  <h1>Big Sale is Live 🔥</h1>
  <p>Up to 70% Off</p>
  <button>Shop Now</button>
</div>

<!-- PRODUCTS -->
<h2 class="section-title">Popular Products</h2>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/150" alt="">
    <h3>Headphones</h3>
    <p>Rs 2,500</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150" alt="">
    <h3>Watch</h3>
    <p>Rs 3,000</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150" alt="">
    <h3>Shoes</h3>
    <p>Rs 4,500</p>
    <button>Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150" alt="">
    <h3>Phone</h3>
    <p>Rs 25,000</p>
    <button>Add to Cart</button>
  </div>

</div>

<!-- FOOTER -->
<footer>
  <p>© 2026 Daraz Clone (Practice Project)</p>
</footer>

</body>
</html>
